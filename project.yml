name: GlassMateBG
targets:
  GlassMateBG:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GlassMateBG
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glassmate.bg
        INFOPLIST_FILE: GlassMateBG/Info.plist
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: GlassMateBG/Info.plist
      properties:
        CFBundleDisplayName: GlassMate BG
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIRequiredDeviceCapabilities:
          - armv7
          - bluetooth-le
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
          - fetch
        NSMicrophoneUsageDescription: "GlassMate BG използва микрофона за разпознаване на гласови команди през очилата."
        NSSpeechRecognitionUsageDescription: "GlassMate BG използва разпознаване на реч за да разбере гласовите ви команди."
        NSPhotoLibraryUsageDescription: "GlassMate BG използва снимките за анализ на изображения от очилата."
        NSPhotoLibraryAddUsageDescription: "GlassMate BG може да запазва анализирани изображения."
        UIUserInterfaceStyle: Dark
